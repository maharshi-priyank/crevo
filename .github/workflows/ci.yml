name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: creator-os-bharat

      - name: Typecheck
        run: pnpm typecheck
        working-directory: creator-os-bharat

      - name: Lint
        run: pnpm lint
        working-directory: creator-os-bharat

      - name: Test
        run: pnpm test
        working-directory: creator-os-bharat

      - name: Build
        run: pnpm build
        working-directory: creator-os-bharat
