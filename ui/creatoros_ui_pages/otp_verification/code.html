<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Plus+Jakarta+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .otp-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-container": "#16007d",
              "on-tertiary": "#6c0f4c",
              "on-secondary-container": "#d1d0cd",
              "on-primary-fixed": "#000000",
              "on-error-container": "#ffb2b9",
              "primary": "#a8a4ff",
              "on-background": "#f9f5f8",
              "surface-container-highest": "#262528",
              "primary-container": "#9995ff",
              "surface-dim": "#0e0e10",
              "on-secondary-fixed-variant": "#5b5c5a",
              "on-tertiary-fixed": "#360023",
              "inverse-surface": "#fcf8fb",
              "inverse-on-surface": "#565557",
              "on-secondary-fixed": "#3e403e",
              "surface-container-low": "#131315",
              "on-primary": "#1e009f",
              "error-dim": "#d73357",
              "secondary-dim": "#d5d4d2",
              "on-primary-fixed-variant": "#1d0098",
              "surface-container": "#19191c",
              "on-surface": "#f9f5f8",
              "on-tertiary-fixed-variant": "#6d104c",
              "on-error": "#490013",
              "tertiary": "#ff9dd0",
              "primary-fixed-dim": "#8a85ff",
              "surface-container-high": "#1f1f22",
              "surface-container-lowest": "#000000",
              "surface-variant": "#262528",
              "inverse-primary": "#5044e3",
              "on-surface-variant": "#adaaad",
              "on-secondary": "#515250",
              "primary-fixed": "#9995ff",
              "error": "#ff6e84",
              "primary-dim": "#675df9",
              "error-container": "#a70138",
              "secondary-container": "#464745",
              "outline": "#767577",
              "surface": "#0e0e10",
              "tertiary-fixed": "#fe8bc9",
              "secondary": "#e3e2e0",
              "secondary-fixed": "#e3e2e0",
              "secondary-fixed-dim": "#d5d4d2",
              "tertiary-container": "#fb88c6",
              "tertiary-dim": "#eb7bb8",
              "outline-variant": "#48474a",
              "surface-bright": "#2c2c2f",
              "on-tertiary-container": "#5e0041",
              "surface-tint": "#a8a4ff",
              "tertiary-fixed-dim": "#ee7ebb",
              "background": "#0e0e10"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary/30 min-h-screen flex flex-col items-center">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 bg-[#0e0e10]/80 backdrop-blur-[20px] shadow-[0_24px_48px_rgba(168,164,255,0.06)]">
<div class="flex items-center justify-between px-6 h-16 w-full max-w-[390px] mx-auto">
<button class="text-[#a8a4ff] hover:bg-white/5 transition-colors p-2 rounded-full scale-95 active:duration-100">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline text-xl font-semibold text-[#f9f5f8] tracking-tight">Crevo</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-[390px] px-6 pt-32 pb-24 flex flex-col items-start gap-8">
<!-- Identity Header Section -->
<section class="space-y-3">
<h2 class="font-headline text-4xl font-bold tracking-tight text-on-surface">Verify your number</h2>
<p class="text-on-surface-variant font-body leading-relaxed max-w-[280px]">
                OTP sent to <span class="text-on-surface font-semibold">+91 98765 ×××××</span>
</p>
</section>
<!-- State 2: OTP Entry (Active State) -->
<section class="w-full space-y-8">
<div class="flex justify-between items-center gap-2">
<!-- OTP Box 1 (Filled) -->
<div class="w-[52px] h-[60px] bg-surface-container-low border border-outline-variant/30 rounded-xl flex items-center justify-center text-2xl font-bold text-primary">
                    4
                </div>
<!-- OTP Box 2 (Active/Focused) -->
<div class="w-[52px] h-[60px] bg-surface-container-high border-2 border-primary rounded-xl flex items-center justify-center text-2xl font-bold text-on-surface shadow-[0_0_20px_rgba(168,164,255,0.15)]">
<span class="w-0.5 h-6 bg-primary animate-pulse"></span>
</div>
<!-- OTP Box 3 (Empty) -->
<div class="w-[52px] h-[60px] bg-surface-container-low border border-outline-variant/30 rounded-xl flex items-center justify-center text-2xl"></div>
<!-- OTP Box 4 (Empty) -->
<div class="w-[52px] h-[60px] bg-surface-container-low border border-outline-variant/30 rounded-xl flex items-center justify-center text-2xl"></div>
<!-- OTP Box 5 (Empty) -->
<div class="w-[52px] h-[60px] bg-surface-container-low border border-outline-variant/30 rounded-xl flex items-center justify-center text-2xl"></div>
<!-- OTP Box 6 (Empty) -->
<div class="w-[52px] h-[60px] bg-surface-container-low border border-outline-variant/30 rounded-xl flex items-center justify-center text-2xl"></div>
</div>
<!-- Footer Actions -->
<div class="flex flex-col gap-4 pt-4">
<div class="flex items-center justify-between text-sm font-medium">
<span class="text-zinc-500 font-label tracking-widest uppercase text-[10px]">Resend in 0:28</span>
<button class="text-on-surface-variant hover:text-primary transition-colors">Change number</button>
</div>
<button class="w-full h-14 rounded-xl bg-gradient-to-br from-primary-dim to-primary text-on-primary font-bold shadow-lg shadow-primary/10 hover:scale-[0.98] transition-transform active:scale-95">
                    Verify &amp; Continue
                </button>
</div>
</section>
<!-- Visual Context: State 3 (Verifying) & State 4 (Error) Showcase -->
<section class="w-full mt-12 pt-12 border-t border-outline-variant/10 space-y-10">
<h3 class="text-zinc-600 font-label uppercase tracking-widest text-[10px] mb-6 text-center">Flow States Visualization</h3>
<!-- State 3: Verifying -->
<div class="bg-surface-container-lowest/50 p-6 rounded-2xl border border-outline-variant/10 space-y-6">
<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-full border-2 border-primary/20 border-t-primary animate-spin"></div>
<span class="text-on-surface font-medium text-sm">Verifying OTP...</span>
</div>
<div class="flex justify-between opacity-50 grayscale pointer-events-none">
<div class="w-10 h-12 bg-surface-container-high rounded-lg border border-primary/50 flex items-center justify-center">5</div>
<div class="w-10 h-12 bg-surface-container-high rounded-lg border border-primary/50 flex items-center justify-center">2</div>
<div class="w-10 h-12 bg-surface-container-high rounded-lg border border-primary/50 flex items-center justify-center">8</div>
<div class="w-10 h-12 bg-surface-container-high rounded-lg border border-primary/50 flex items-center justify-center">0</div>
<div class="w-10 h-12 bg-surface-container-high rounded-lg border border-primary/50 flex items-center justify-center">1</div>
<div class="w-10 h-12 bg-surface-container-high rounded-lg border border-primary/50 flex items-center justify-center">9</div>
</div>
</div>
<!-- State 4: Error State -->
<div class="bg-surface-container-lowest/50 p-6 rounded-2xl border border-error/10 space-y-6">
<div class="flex items-center gap-4 text-error">
<span class="material-symbols-outlined text-xl" data-icon="error">error</span>
<span class="text-sm font-medium">Invalid OTP. Please try again.</span>
</div>
<div class="flex justify-between otp-shake">
<div class="w-10 h-12 bg-surface-container-low border border-error rounded-lg flex items-center justify-center text-error font-bold">1</div>
<div class="w-10 h-12 bg-surface-container-low border border-error rounded-lg flex items-center justify-center text-error font-bold">2</div>
<div class="w-10 h-12 bg-surface-container-low border border-error rounded-lg flex items-center justify-center text-error font-bold">3</div>
<div class="w-10 h-12 bg-surface-container-low border border-error rounded-lg flex items-center justify-center text-error font-bold">4</div>
<div class="w-10 h-12 bg-surface-container-low border border-error rounded-lg flex items-center justify-center text-error font-bold">5</div>
<div class="w-10 h-12 bg-surface-container-low border border-error rounded-lg flex items-center justify-center text-error font-bold">6</div>
</div>
<div class="flex justify-end">
<button class="text-primary text-xs font-bold uppercase tracking-wider">Resend OTP</button>
</div>
</div>
</section>
</main>
<!-- Navigation Shell Placeholder Logic (Hiding shell for transactional OTP screen) -->
<!-- The BottomNavBar and SideNav are suppressed as per the "Linear/Transactional" suppression rule. -->
<div class="fixed bottom-0 w-full max-w-[390px] mx-auto p-6 text-center pointer-events-none opacity-20">
<div class="h-1 w-32 bg-on-surface-variant/20 mx-auto rounded-full"></div>
</div>
</body></html>
