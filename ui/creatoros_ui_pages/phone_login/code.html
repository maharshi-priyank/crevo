<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&amp;family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-container": "#16007d",
              "on-tertiary": "#6c0f4c",
              "on-secondary-container": "#d1d0cd",
              "on-primary-fixed": "#000000",
              "on-error-container": "#ffb2b9",
              "primary": "#a8a4ff",
              "on-background": "#f9f5f8",
              "surface-container-highest": "#262528",
              "primary-container": "#9995ff",
              "surface-dim": "#0e0e10",
              "on-secondary-fixed-variant": "#5b5c5a",
              "on-tertiary-fixed": "#360023",
              "inverse-surface": "#fcf8fb",
              "inverse-on-surface": "#565557",
              "on-secondary-fixed": "#3e403e",
              "surface-container-low": "#131315",
              "on-primary": "#1e009f",
              "error-dim": "#d73357",
              "secondary-dim": "#d5d4d2",
              "on-primary-fixed-variant": "#1d0098",
              "surface-container": "#19191c",
              "on-surface": "#f9f5f8",
              "on-tertiary-fixed-variant": "#6d104c",
              "on-error": "#490013",
              "tertiary": "#ff9dd0",
              "primary-fixed-dim": "#8a85ff",
              "surface-container-high": "#1f1f22",
              "surface-container-lowest": "#000000",
              "surface-variant": "#262528",
              "inverse-primary": "#5044e3",
              "on-surface-variant": "#adaaad",
              "on-secondary": "#515250",
              "primary-fixed": "#9995ff",
              "error": "#ff6e84",
              "primary-dim": "#675df9",
              "error-container": "#a70138",
              "secondary-container": "#464745",
              "outline": "#767577",
              "surface": "#0e0e10",
              "tertiary-fixed": "#fe8bc9",
              "secondary": "#e3e2e0",
              "secondary-fixed": "#e3e2e0",
              "secondary-fixed-dim": "#d5d4d2",
              "tertiary-container": "#fb88c6",
              "tertiary-dim": "#eb7bb8",
              "outline-variant": "#48474a",
              "surface-bright": "#2c2c2f",
              "on-tertiary-container": "#5e0041",
              "surface-tint": "#a8a4ff",
              "tertiary-fixed-dim": "#ee7ebb",
              "background": "#0e0e10"
            },
            fontFamily: {
              "headline": ["Noto Serif"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface selection:bg-primary/30">
<!-- Auth Canvas Container -->
<main class="relative min-h-screen flex flex-col items-center justify-center p-6 overflow-hidden">
<!-- Ambient Background Textures -->
<div class="absolute inset-0 z-0">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-tertiary/5 blur-[100px] rounded-full"></div>
<!-- Grain Texture Overlay -->
<div class="absolute inset-0 opacity-[0.03] pointer-events-none bg-[url('https://grainy-gradients.vercel.app/noise.svg')]"></div>
</div>
<!-- Authentication Card -->
<div class="w-full max-w-[420px] z-10">
<!-- Branding -->
<div class="flex flex-col items-center mb-12">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center shadow-[0_8px_24px_rgba(168,164,255,0.2)] mb-6">
<span class="text-on-primary font-headline text-2xl font-bold">C</span>
</div>
<h1 class="font-headline text-3xl font-semibold tracking-tight text-center text-on-surface">Crevo</h1>
</div>
<!-- Content Area (Card Shift) -->
<div class="bg-surface-container-low rounded-[2rem] p-8 shadow-[0_24px_64px_rgba(0,0,0,0.4)] border border-outline-variant/10">
<header class="mb-10">
<h2 class="font-body text-2xl font-semibold text-on-surface mb-3">Enter your mobile number</h2>
<p class="text-on-surface-variant text-sm leading-relaxed">
                        We'll send you a 6-digit OTP on WhatsApp or SMS
                    </p>
</header>
<!-- Phone Input Field -->
<div class="space-y-12">
<div class="relative flex items-end pb-2 border-b-2 border-outline-variant focus-within:border-primary transition-colors duration-300">
<!-- Country Pill -->
<div class="flex items-center gap-2 bg-surface-container-highest px-3 py-1.5 rounded-full mr-4 mb-1">
<span class="text-lg">🇮🇳</span>
<span class="text-on-surface font-semibold text-sm">+91</span>
</div>
<!-- Input -->
<input class="w-full bg-transparent border-none p-0 text-[24px] font-medium tracking-widest text-on-surface placeholder:text-outline/30 focus:ring-0 focus:outline-none" inputmode="numeric" maxlength="10" placeholder="00000 00000" type="tel"/>
</div>
<!-- Action Button -->
<button class="group relative w-full h-[56px] bg-gradient-to-br from-primary-dim to-primary rounded-2xl flex items-center justify-center gap-3 overflow-hidden transition-all duration-300 active:scale-[0.98] shadow-lg shadow-primary/20">
<span class="text-on-primary font-bold text-base">Send OTP</span>
<span class="material-symbols-outlined text-on-primary transition-transform duration-300 group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
<!-- Button Glow Effect -->
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
</div>
<!-- Terms -->
<footer class="mt-8 text-center">
<p class="text-[12px] text-on-surface-variant leading-relaxed px-4">
                        By continuing, you agree to our <a class="text-primary hover:underline underline-offset-4" href="#">Terms</a> &amp; <a class="text-primary hover:underline underline-offset-4" href="#">Privacy Policy</a>
</p>
</footer>
</div>
<!-- Trust Badge -->
<div class="mt-8 flex items-center justify-center gap-2 text-on-surface-variant/60">
<span class="material-symbols-outlined text-[18px]" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
<span class="text-[13px] font-medium">Secured by Crevo · No spam</span>
</div>
</div>
<!-- Secondary Layout Shift Placeholder (Visual Balance) -->
<div class="mt-24 w-full max-w-4xl grid grid-cols-1 md:grid-cols-3 gap-6 opacity-40 pointer-events-none hidden md:grid">
<div class="h-32 bg-surface-container-low rounded-2xl border border-outline-variant/5"></div>
<div class="h-32 bg-surface-container-low rounded-2xl border border-outline-variant/5"></div>
<div class="h-32 bg-surface-container-low rounded-2xl border border-outline-variant/5"></div>
</div>
</main>
<!-- Contextual Nav Suppression Applied: Auth screens do not show global navigation shells -->
</body></html>
