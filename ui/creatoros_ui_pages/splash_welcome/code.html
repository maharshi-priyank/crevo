<style>
        @keyframes splash-scale {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes fade-in-up {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        @keyframes slide-up-sheet {
            0% { transform: translateY(100%); }
            100% { transform: translateY(0); }
        }
        @keyframes glow-pulse {
            0% { box-shadow: 0 0 20px rgba(168, 164, 255, 0.1); }
            50% { box-shadow: 0 0 60px rgba(168, 164, 255, 0.3); }
            100% { box-shadow: 0 0 20px rgba(168, 164, 255, 0.1); }
        }
        .splash-active { animation: splash-scale 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .fade-in-delayed { opacity: 0; animation: fade-in-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards; }
        .sheet-animate { animation: slide-up-sheet 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards; }
        .stagger-1 { opacity: 0; animation: fade-in-up 0.5s ease-out 1s forwards; }
        .stagger-2 { opacity: 0; animation: fade-in-up 0.5s ease-out 1.1s forwards; }
        .stagger-3 { opacity: 0; animation: fade-in-up 0.5s ease-out 1.2s forwards; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface font-body text-on-surface selection:bg-primary/30 antialiased overflow-hidden h-screen">
<!-- Splash Container (Phase 1) -->
<!-- Note: In a real app this would transition out, here it is layered for static presentation -->
<div class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-surface pointer-events-none opacity-0 invisible" id="splash-layer">
<div class="relative">
<div class="absolute inset-0 bg-primary/20 blur-[80px] rounded-full" style="animation: glow-pulse 2s infinite ease-in-out;"></div>
<h1 class="font-headline text-5xl font-bold text-on-surface relative z-10 tracking-tight splash-active">Crevo</h1>
</div>
<p class="mt-6 text-on-surface-variant font-body tracking-wide fade-in-delayed">Your creator business. Starts here.</p>
</div>
<!-- Welcome Screen (Phase 2) -->
<main class="relative h-full flex flex-col overflow-hidden">
<!-- Top 40%: Abstract CSS Art Storefront -->
<section class="h-[40%] relative bg-[#0C0C0E] overflow-hidden flex items-center justify-center">
<!-- Background Grain -->
<div class="absolute inset-0 opacity-[0.03] pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]"></div>
<!-- Abstract Creator Storefront UI -->
<div class="relative w-full max-w-sm h-full flex items-center justify-center">
<!-- Phone Frame Shadow -->

<!-- Main Storefront Card -->
<div class="absolute w-52 h-80 bg-surface-container-highest rounded-[2.5rem] shadow-[0_32px_64px_rgba(0,0,0,0.6)] border border-outline-variant/20 rotate-[2deg] flex flex-col p-4">
<div class="w-10 h-10 rounded-full bg-primary/20 mb-4 self-center overflow-hidden">
<img alt="Creator Profile" class="w-full h-full object-cover" data-alt="Abstract creator profile avatar in purple tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC2qES9XsKX7quBhVky2qZNLOW01sMKAedpAj784xWcl3Ab8FRgAADi1InRJnXnIyStUXKNlF81ytfG3TYE39V2xaI5VdiJSIZHcx0p59OI_LFTnypqrkTRulw_m4-p0a5wD52LeNsrYaSZqqk4_14N90eV63eFOF3bJ5qN15GedhI7uT8nI1YSyLc1nGY47MPhhebgGxc5c4953d2XsxfuIBGuVWIEmLGHe_w7EvG4TtJF7EhJa80EEXKZF5UeP8hProWA5OTRcTD_"/>

<div class="h-2 w-24 bg-on-surface-variant/20 rounded-full mx-auto"></div>
<div class="h-2 w-16 bg-on-surface-variant/10 rounded-full mx-auto"></div>
</div>
<div class="grid grid-cols-2 gap-2 mt-auto">
<div class="h-16 rounded-xl bg-surface-container-low border border-outline-variant/10"></div>
<div class="h-16 rounded-xl bg-surface-container-low border border-outline-variant/10"></div>
</div>
</div>
<!-- Floating Elements: UPI, WhatsApp, AI -->
<div class="absolute top-1/4 right-8 w-14 h-14 bg-white/10 backdrop-blur-md rounded-2xl flex items-center justify-center shadow-xl border border-white/10 rotate-12">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">payments</span>
</div>
<div class="absolute bottom-1/4 left-6 w-12 h-12 bg-emerald-500/20 backdrop-blur-md rounded-full flex items-center justify-center shadow-xl border border-emerald-500/20 -rotate-12">
<span class="material-symbols-outlined text-emerald-400">chat</span>
</div>
<div class="absolute top-1/2 -left-4 w-16 h-16 bg-primary-dim/20 backdrop-blur-lg rounded-3xl flex items-center justify-center shadow-2xl border border-primary/20 rotate-[15deg]">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">psychology</span>
</div>
</div>
</section>

</button>

<!-- Header Shadow Component (Hidden during welcome, but available for structural reference) -->
<header class="hidden md:flex fixed top-0 w-full z-50 bg-[#0e0e10]/80 backdrop-blur-[20px] items-center justify-between px-6 h-16 max-w-[390px] mx-auto shadow-[0_24px_48px_rgba(168,164,255,0.06)]">

<div class="flex gap-4">
<span class="material-symbols-outlined text-[#a8a4ff]">arrow_back</span>
</div>
</header>
<!-- Dynamic Transition Logic Simulation -->
<script>
        // This simulates the splash -> welcome transition requested
        window.addEventListener('DOMContentLoaded', () => {
            const splash = document.getElementById('splash-layer');
            
            // Show splash
            splash.classList.remove('invisible');
            splash.classList.add('opacity-100');
            
            // Hide splash and reveal welcome after 1.5s (to allow animation to finish)
            setTimeout(() => {
                splash.classList.add('opacity-0');
                setTimeout(() => {
                    splash.classList.add('hidden');
                }, 500);
            }, 1800);
        });
    </script>
</body></html>
